name: Deploy to Surge
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug and Deploy
        run: |
          # 1. Проверяем, видит ли робот логин
          echo "Attempting to login as: ${{ secrets.SURGE_LOGIN }}"
          
          # 2. Попробуем проверить токен (выведет только часть для безопасности)
          echo "Token check: $(echo ${{ secrets.SURGE_TOKEN }} | cut -c 1-5)..."

          # 3. Деплой на ГАРАНТИРОВАННО уникальный домен
          # Используем имя-секунды, такой точно будет свободен
          DOMAIN="fenix-fugu-${{ github.run_id }}.surge.sh"
          echo "Target domain: $DOMAIN"
          
          npx surge . $DOMAIN --token ${{ secrets.SURGE_TOKEN }} --login ${{ secrets.SURGE_LOGIN }}
