name: Deploy to Surge
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean and Deploy
        env:
          # Это официальный способ передачи токена
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
        run: |
          # 1. Удаляем файл CNAME, если он вдруг есть (он может все портить)
          rm -f CNAME
          
          # 2. Деплоим на СУПЕР-РАНДОМНЫЙ домен
          # Используем дату в секундах, такого точно ни у кого нет
          RANDOM_DOMAIN="fenix-fugu-$(date +%s).surge.sh"
          echo "Deploying to: $RANDOM_DOMAIN"
          
          npx surge . $RANDOM_DOMAIN
