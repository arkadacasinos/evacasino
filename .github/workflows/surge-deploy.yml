name: Deploy to Surge
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Surge
        run: |
          # ВНИМАНИЕ: Тут я изменил домен на уникальный
          # Проверь, чтобы в GitHub Secrets были именно SURGE_LOGIN и SURGE_TOKEN
          npx surge . evacasino.surge.sh --token ${{ secrets.SURGE_TOKEN }} --login ${{ secrets.SURGE_LOGIN }}
